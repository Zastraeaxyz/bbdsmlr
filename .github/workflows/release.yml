name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop app
        run: pnpm desktop:build

      - name: Zip dist-desktop
        run: |
          cd dist-desktop
          7z a ../BetterBDSMLR-${{ github.ref_name }}-windows.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterBDSMLR-windows
          path: BetterBDSMLR-${{ github.ref_name }}-windows.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: BetterBDSMLR-windows

      - name: Extract latest changelog entry
        run: |
          awk '/^## \[.*\].*-[0-9]/ { if (found) exit; found=1; print; next } found { print }' CHANGELOG.md > /tmp/release_notes.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            "BetterBDSMLR-${{ github.ref_name }}-windows.zip"
